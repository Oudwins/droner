info:
  name: Create Session
  type: http
  seq: 2
  tags:
    - sessions

http:
  method: POST
  url: "{{baseUrl}}/sessions"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "path": "{{dronerRepoPath}}"
      }

runtime:
  scripts:
    - type: after-response
      code: bru.setVar("sessionBranch", res.getBody().branch);

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Creates a session against the local droner server.
  Set DRONER_REPO_PATH to an absolute path to a git repository before running.
