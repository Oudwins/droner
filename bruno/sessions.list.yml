info:
  name: List Sessions
  type: http
  seq: 3
  tags:
    - sessions

http:
  method: GET
  url: "{{baseUrl}}/sessions?limit=10&status=running"
  params:
    - name: limit
      value: "10"
      type: query
    - name: status
      value: queued
      type: query
      disabled: true
    - name: status
      value: running
      type: query
    - name: cursor
      value: ""
      type: query
      disabled: true
    - name: direction
      value: after
      type: query
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
