info:
  name: List Sessions
  type: http
  seq: 11
  tags:
    - sessions

http:
  method: GET
  url: "{{baseUrl}}/sessions?limit=10&status=queued&status=running"
  params:
    - name: limit
      value: "10"
      type: query
    - name: status
      value: queued
      type: query
    - name: status
      value: running
      type: query

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
