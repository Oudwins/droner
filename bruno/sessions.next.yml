info:
  name: Next Session
  type: http
  seq: 13
  tags:
    - sessions

http:
  method: GET
  url: "{{baseUrl}}/_session/next"
  params:
    - name: id
      value: "{{sessionId}}"
      type: query
      disabled: true
    - name: branch
      value: "{{sessionBranch}}"
      type: query
      disabled: true

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
