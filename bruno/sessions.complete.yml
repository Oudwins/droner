info:
  name: Complete Session
  type: http
  seq: 4
  tags:
    - sessions

http:
  method: POST
  url: "{{baseUrl}}/sessions/complete"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "branch": "{{sessionBranch}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
