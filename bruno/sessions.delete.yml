info:
  name: Delete Session
  type: http
  seq: 5
  tags:
    - sessions

http:
  method: DELETE
  url: "{{baseUrl}}/sessions"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "branch": "{{sessionBranch}}"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
