info:
  name: Delete Session
  type: http
  seq: 13
  tags:
    - sessions

http:
  method: DELETE
  url: "{{baseUrl}}/sessions"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "branch": "{{sessionBranch}}"
      }

runtime:
  scripts:
    - type: tests
      code: |-
        test("returns accepted", function() {
          expect(res.status).to.equal(202);
        });

        test("returns a deletion task", function() {
          expect(res.getBody()).to.have.property("task_id");
          expect(res.getBody().type).to.equal("session_delete");
        });

settings:
  encodeUrl: true
